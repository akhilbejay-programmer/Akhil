<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Places</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:80%;
            max-width:800px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h1{
            color:#0b5394;
            text-align:center;
        }

        form{
            margin:20px 0;
            text-align:center;
        }

        input{
            width:70%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            padding:12px 20px;
            background:#0b5394;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#073763;
        }

        ul{
            margin-top:20px;
        }

        li{
            padding:8px;
            font-size:18px;
        }

        .budget{
            margin-top:20px;
            color:green;
            font-weight:bold;
            font-size:20px;
        }

        .error{
            color:red;
            text-align:center;
            margin-top:20px;
            font-weight:bold;
        }

        a{
            display:block;
            text-align:center;
            margin-top:30px;
            text-decoration:none;
            color:#0b5394;
            font-weight:bold;
        }
    </style>

</head>
<body>

<div class="container">

<h1>View Tourist Places</h1>

<form method="POST">

<input
type="text"
name="state"
placeholder="Enter Indian State or Union Territory"
required>

<br><br>

<button type="submit">
Show Places
</button>

</form>

{% if error %}

<div class="error">
{{ error }}
</div>

{% endif %}

{% if places %}

<h2>{{ state }}</h2>

<ul>

{% for place,cost in places.items() %}

<li>{{ place }} — ₹{{ cost }}</li>

{% endfor %}

</ul>

<div class="budget">

Approximate Total Budget:
₹{{ total_budget }}

</div>

{% endif %}

<a href="/">⬅ Back to Home</a>

</div>

</body>
</html>
