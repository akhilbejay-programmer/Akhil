<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Tour Plan</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

.container{
    width:500px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#0b5394;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0b5394;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#073763;
}

.error{
    color:red;
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

a{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#0b5394;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>Make My Tour Plan</h1>

<form method="POST">

<input
type="text"
name="state"
placeholder="Enter State Name"
required>

<input
type="number"
name="budget"
placeholder="Enter Your Budget"
required>

<button type="submit">
Generate Tour Plan
</button>

</form>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<a href="/">⬅ Back to Home</a>

</div>

</body>
</html>
